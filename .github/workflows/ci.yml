name: CI
on:
  push: {branches:  [main] }
  pull_request: {branches: [main] }
jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: api} }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setups-node@v4
        with: { node-version: '20' }
      - run: npm install
      - run: npm test
